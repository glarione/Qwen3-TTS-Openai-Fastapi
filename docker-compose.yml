services:
  qwen3api:
    build:
      context: .
      dockerfile: Dockerfile
      # target: production
    container_name: qwen3api
    # network_mode: host
    ports:
      - "8880:8880"
    environment:
      - HOST=0.0.0.0
      - PORT=8880
      - WORKERS=1
      - CORS_ORIGINS=*
      - TTS_WARMUP_ON_START=true
      - TTS_MODEL_ID=Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice
      # When using device_ids filter, the GPU appears as device 0 inside container
      # - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      # Mount model cache for persistence
      - ./voice_library:/home/appuser/qwen3-tts/voice_library
      - /mnt/network/llm-models/hub:/home/appuser/.cache/huggingface/hub:rw
      - ./config.yaml:/app/qwen3-tts/config.yaml
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [ gpu ]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8880/health"]
      interval: 40s
      timeout: 20s
      retries: 3
      start_period: 180s

